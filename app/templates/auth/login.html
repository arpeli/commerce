{% extends 'base.html' %}
{% block title %}Login - ShopKenya{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2 text-center">Welcome back</h2>
        <p class="text-gray-500 text-center mb-6">Sign in to your ShopKenya account</p>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email address</label>
                <input type="email" id="email" name="email" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
                    placeholder="you@example.com">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-2 rounded-lg font-semibold text-lg hover:from-purple-700 hover:to-indigo-700 transition shadow">
                Sign In
            </button>
        </form>
        <p class="text-center text-gray-500 mt-4 text-sm">
            Don't have an account?
            <a href="{{ url_for('auth.signup') }}" class="text-indigo-600 font-semibold hover:underline">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
