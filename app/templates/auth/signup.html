{% extends 'base.html' %}
{% block title %}Sign Up - ShopKenya{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2 text-center">Create an account</h2>
        <p class="text-gray-500 text-center mb-6">Join ShopKenya today</p>
        <form method="POST" action="{{ url_for('auth.signup') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1" for="name">Full Name</label>
                <input type="text" id="name" name="name" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
                    placeholder="John Doe">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email address</label>
                <input type="email" id="email" name="email" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
                    placeholder="you@example.com">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
                    placeholder="At least 6 characters">
            </div>
            <div class="mb-6 flex items-center space-x-2">
                <input type="checkbox" id="is_store_owner" name="is_store_owner"
                    class="w-4 h-4 text-indigo-600 rounded">
                <label for="is_store_owner" class="text-sm text-gray-700 font-medium">
                    I want to create a store <span class="text-indigo-600">(Store Owner)</span>
                </label>
            </div>
            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-2 rounded-lg font-semibold text-lg hover:from-purple-700 hover:to-indigo-700 transition shadow">
                Create Account
            </button>
        </form>
        <p class="text-center text-gray-500 mt-4 text-sm">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="text-indigo-600 font-semibold hover:underline">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
