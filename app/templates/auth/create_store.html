{% extends 'base.html' %}
{% block title %}Create Your Store - ShopKenya{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2 text-center">Create Your Store</h2>
        <p class="text-gray-500 text-center mb-2">Set up your ShopKenya storefront</p>
        <p class="text-xs text-indigo-500 text-center mb-6">Your store URL slug will be auto-generated from your store name.</p>
        <form method="POST" action="{{ url_for('auth.create_store') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1" for="name">Store Name</label>
                <input type="text" id="name" name="name" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
                    placeholder="My Amazing Store">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1" for="description">Description</label>
                <textarea id="description" name="description" rows="3"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
                    placeholder="Tell customers about your store..."></textarea>
            </div>
            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-2 rounded-lg font-semibold text-lg hover:from-purple-700 hover:to-indigo-700 transition shadow">
                Launch My Store 🚀
            </button>
        </form>
    </div>
</div>
{% endblock %}
