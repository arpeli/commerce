{% extends 'base.html' %}
{% block title %}{% if product %}Edit Product{% else %}Add Product{% endif %} - Admin{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-extrabold text-gray-900 mb-8">
        {% if product %}✏️ Edit Product{% else %}➕ Add Product{% endif %}
    </h1>
    <div class="bg-white rounded-2xl shadow p-8 border border-gray-100">
        <form method="POST" action="{{ url_for('admin.edit_product', product_id=product.id) if product else url_for('admin.add_product') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
                <input type="text" name="name" required
                    value="{{ product.name if product else '' }}"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                    placeholder="e.g. Organic Honey 500g">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea name="description" rows="3"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                    placeholder="Product description...">{{ product.description if product else '' }}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Price (KES) *</label>
                    <input type="number" name="price" required min="0" step="0.01"
                        value="{{ product.price if product else '' }}"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                        placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Stock *</label>
                    <input type="number" name="stock" required min="0"
                        value="{{ product.stock if product else '' }}"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                        placeholder="0">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <input type="text" name="category"
                    value="{{ product.category if product else 'General' }}"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                    placeholder="e.g. Electronics, Food, Clothing">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                <input type="url" name="image_url"
                    value="{{ product.image_url if product else '' }}"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                    placeholder="https://example.com/image.jpg">
            </div>
            <div class="flex items-center space-x-4">
                <button type="submit"
                    class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-8 py-2 rounded-xl font-semibold hover:from-purple-700 hover:to-indigo-700 transition shadow">
                    {% if product %}Update Product{% else %}Add Product{% endif %}
                </button>
                <a href="{{ url_for('admin.products') }}" class="text-gray-500 hover:underline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
